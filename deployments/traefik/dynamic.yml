# ============================================================================
# Traefik dynamic configuration
# Hot-reloaded by Traefik. The runtime-agent will eventually overwrite this
# file (or write sibling files) to register routes for user services.
# ============================================================================

http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        contentSecurityPolicy: "default-src 'self'"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Powered-By: "NebulaCloud"

    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s

    compress:
      compress: {}

    # Strip /api prefix when mounted at sub-paths (kept for future use)
    api-strip:
      stripPrefix:
        prefixes:
          - /api

