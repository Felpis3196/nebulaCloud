# ============================================================================
# NebulaCloud — development overrides
# Layered on top of docker-compose.yml. Adds exposed ports and dev tweaks.
# ============================================================================

name: nebula

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  registry:
    ports:
      - "5000:5000"

  api:
    build:
      target: api-dev
    environment:
      NEBULA_LOG_LEVEL: debug
      NEBULA_ENV: development
    ports:
      - "8080:8080"
      - "9100:9100" # /metrics
    volumes:
      - ./backend:/workspace

  # ==========================================================================
  # Frontend (Next.js 15 dashboard) — dev only
  # Production image is shipped via the standalone Next runtime in Phase 9.
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://api.nebula.localhost
      NEXT_PUBLIC_APP_URL: http://app.nebula.localhost
      WATCHPACK_POLLING: "true"   # reliable HMR on Docker Desktop
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - nebula_platform
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`app.nebula.localhost`)
      - traefik.http.routers.app.entrypoints=web
      - traefik.http.services.app.loadbalancer.server.port=3000
      - traefik.http.routers.app.middlewares=secure-headers@file
