# ============================================================================
# NebulaCloud — base compose
# Brings up the full platform: ingress, control plane, datastores, observability.
# Use `docker-compose.dev.yml` as an overlay for local development.
# ============================================================================

name: nebula

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-restart: &default-restart
  restart: unless-stopped

networks:
  # Platform network: control plane and infra
  nebula_platform:
    name: nebula_platform
    driver: bridge
  # Apps network: where built user containers will run (Traefik joined too)
  nebula_apps:
    name: nebula_apps
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  registry_data:
  traefik_certs:

services:
  # ==========================================================================
  # Ingress
  # ==========================================================================
  traefik:
    image: traefik:v3.1
    <<: *default-restart
    logging: *default-logging
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # dashboard (dev only — restrict in prod)
    volumes:
      - ./deployments/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deployments/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - traefik_certs:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nebula_platform
      - nebula_apps
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.nebula.localhost`)
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.entrypoints=web
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Datastores
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nebula}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - nebula_platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula} -d ${POSTGRES_DB:-nebula}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    <<: *default-restart
    logging: *default-logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - nebula_platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # OCI registry — receives images pushed by the build worker
  # ==========================================================================
  registry:
    image: registry:2
    <<: *default-restart
    logging: *default-logging
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - nebula_platform
    labels:
      - traefik.enable=true
      - traefik.http.routers.registry.rule=Host(`registry.nebula.localhost`)
      - traefik.http.routers.registry.entrypoints=web
      - traefik.http.services.registry.loadbalancer.server.port=5000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/v2/"]
      interval: 15s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Observability stack
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    <<: *default-restart
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nebula_platform
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 3s
      retries: 5

  loki:
    image: grafana/loki:3.2.0
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./deployments/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - nebula_platform
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 3s
      retries: 10

  promtail:
    image: grafana/promtail:3.2.0
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deployments/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nebula_platform
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    <<: *default-restart
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - nebula_platform
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.nebula.localhost`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 10

  # ==========================================================================
  # Control plane — API gateway / modular monolith
  # ==========================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    <<: *default-restart
    logging: *default-logging
    # Defaults from repo; optional `.env` overrides (copy from .env.example if you want a local file).
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      NEBULA_SERVICE_NAME: nebula-api
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEBULA_LOKI_URL: http://loki:3100
      NEBULA_PROMETHEUS_URL: http://prometheus:9090
    networks:
      - nebula_platform
      - nebula_apps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.nebula.localhost`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=8080
      - traefik.http.routers.api.middlewares=secure-headers@file
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  build-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build-worker
    <<: *default-restart
    logging: *default-logging
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      NEBULA_SERVICE_NAME: nebula-build-worker
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEBULA_REGISTRY_URL: registry:5000
      NEBULA_REGISTRY_INSECURE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nebula_platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry:
        condition: service_started

  runtime-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime-agent
    <<: *default-restart
    logging: *default-logging
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      NEBULA_SERVICE_NAME: nebula-runtime-agent
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEBULA_REGISTRY_URL: registry:5000
      NEBULA_REGISTRY_INSECURE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nebula_platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry:
        condition: service_started
